name: CI

on:
  push:
    branches: [main, 'phase-*', 'bootstrap/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, typecheck, lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aicos
          POSTGRES_PASSWORD: aicos_dev_2026
          POSTGRES_DB: aicos_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U aicos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Owner/migration role (superuser) — runs push/rls/seed.
      DATABASE_URL: postgresql://aicos:aicos_dev_2026@localhost:5432/aicos_test?schema=public
      # Least-privilege app role (created by db:rls) — RLS is enforced; used by the isolation test.
      APP_DATABASE_URL: postgresql://aicos_app:aicos_app_dev_2026@localhost:5432/aicos_test?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci_access_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push schema to test DB
        run: pnpm db:push

      - name: Apply Row-Level Security policies
        run: pnpm db:rls

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test (incl. cross-tenant isolation)
        run: pnpm test
